version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: smartcity_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smartcity
    volumes:
      - mongo_data:/data/db
    networks:
      - smartcity_net

  neo4j:
    image: neo4j:5.18
    container_name: smartcity_neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/smartcity123
    volumes:
      - neo4j_data:/data
    networks:
      - smartcity_net

  redis:
    image: redis:7.2-alpine
    container_name: smartcity_redis
    ports:
      - "6379:6379"
    networks:
      - smartcity_net

  cassandra:
    image: cassandra:4.1
    container_name: smartcity_cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: SmartCityCluster
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - smartcity_net
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10

  app:
    build: .
    container_name: smartcity_app
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/smartcity
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: smartcity123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CASSANDRA_HOST: cassandra
    depends_on:
      - mongodb
      - neo4j
      - redis
      - cassandra
    networks:
      - smartcity_net
    volumes:
      - .:/app

volumes:
  mongo_data:
  neo4j_data:
  cassandra_data:

networks:
  smartcity_net:
    driver: bridge
