version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: smartcity_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smartcity
    volumes:
      - mongo_data:/data/db
    networks:
      - smartcity_net

  neo4j:
    image: neo4j:5.18
    container_name: smartcity_neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/smartcity123
    volumes:
      - neo4j_data:/data
    networks:
      - smartcity_net

  redis:
    image: redis:7.2-alpine
    container_name: smartcity_redis
    ports:
      - "6379:6379"
    networks:
      - smartcity_net

  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: smartcity_elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - smartcity_net

  app:
    build: .
    container_name: smartcity_app
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/smartcity
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: smartcity123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      - mongodb
      - neo4j
      - redis
      - elasticsearch
    networks:
      - smartcity_net
    volumes:
      - .:/app

volumes:
  mongo_data:
  neo4j_data:
  elastic_data:

networks:
  smartcity_net:
    driver: bridge
