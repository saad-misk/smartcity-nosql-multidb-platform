<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technician Dashboard - SmartCity</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="nav">
        <a href="/dashboard" class="nav-brand">SmartCity Platform</a>
        <div class="nav-actions">
            <span class="user-info">Technician</span>
            <button onclick="logout()" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom: 1.5rem;">Department Issues</h2>
        <p style="color: #636e72; margin-bottom: 1.5rem;">Prioritized by urgency (High priority first)</p>
        
        <div id="department-requests">
            <div class="loading">Loading requests...</div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
