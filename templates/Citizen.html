<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Citizen — SmartCity</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f4f6fb; --surface: #fff; --border: #e4e8f0;
      --text: #1a1d27; --text-dim: #6b7080;
      --accent: #2563eb; --accent-lt: #eff4ff;
      --green: #059669; --green-lt: #ecfdf5;
      --warn: #d97706; --warn-lt: #fffbeb;
      --red: #dc2626; --red-lt: #fef2f2;
      --purple: #7c3aed; --purple-lt: #f5f3ff;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Nav */
    nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
      height: 56px; position: sticky; top: 0; z-index: 50;
    }
    .nav-brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 0.95rem; color: var(--accent); }
    .nav-brand span { font-size: 1.2rem; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user { font-size: 0.82rem; color: var(--text-dim); }
    .nav-user strong { color: var(--text); }
    .btn-logout {
      padding: 5px 13px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; font-size: 0.8rem; font-weight: 600; cursor: pointer;
      color: var(--text-dim); font-family: 'DM Sans', sans-serif; transition: all .15s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* Layout */
    .layout { max-width: 960px; margin: 0 auto; padding: 24px 20px 60px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
    .card-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .card-head-icon { font-size: 1.2rem; }
    .card-head h2 { font-size: 0.95rem; font-weight: 700; }
    .card-head p  { font-size: 0.76rem; color: var(--text-dim); margin-top: 1px; }
    .card-body { padding: 20px; }

    /* Form */
    .field { margin-bottom: 15px; }
    label { display: block; font-size: 0.76rem; font-weight: 600; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
    input, select, textarea {
      width: 100%; background: var(--bg); border: 1.5px solid var(--border);
      color: var(--text); padding: 9px 12px; border-radius: 8px;
      font-size: 0.875rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 88px; line-height: 1.5; }
    input::placeholder, textarea::placeholder { color: #b0b7c8; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Category picker */
    .cat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .cat-btn {
      border: 1.5px solid var(--border); background: var(--bg); border-radius: 9px;
      padding: 10px 6px; cursor: pointer; text-align: center; transition: all .18s;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .cat-btn:hover { border-color: var(--accent); background: var(--accent-lt); }
    .cat-btn.sel { border-color: var(--accent); background: var(--accent-lt); }
    .cat-btn .ci { font-size: 1.2rem; }
    .cat-btn .cl { font-size: 0.68rem; font-weight: 600; color: var(--text-dim); }
    .cat-btn.sel .cl { color: var(--accent); }

    /* Submit button */
    .btn-submit {
      width: 100%; padding: 11px; border-radius: 9px; border: none;
      background: var(--accent); color: white; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all .2s; margin-top: 16px;
    }
    .btn-submit:hover { filter: brightness(1.08); }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    /* Messages */
    .msg { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 0.82rem; font-weight: 500; display: none; }
    .msg.ok  { display: block; background: var(--green-lt); color: var(--green); border: 1px solid rgba(5,150,105,.2); }
    .msg.err { display: block; background: var(--red-lt);   color: var(--red);   border: 1px solid rgba(220,38,38,.2); }

    /* Request list */
    .req-item {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 10px; padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .req-item:last-child { border: none; }
    .req-cat { font-size: 0.85rem; font-weight: 600; margin-bottom: 3px; }
    .req-desc { font-size: 0.78rem; color: var(--text-dim); line-height: 1.4; }
    .req-meta { font-size: 0.72rem; color: var(--text-dim); margin-top: 4px; }

    .badge {
      padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600;
      border: 1px solid; white-space: nowrap; flex-shrink: 0;
    }
    .badge.pending     { background: var(--warn-lt);   color: var(--warn);   border-color: rgba(217,119,6,.2); }
    .badge.assigned    { background: var(--purple-lt); color: var(--purple); border-color: rgba(124,58,237,.2); }
    .badge.in_progress { background: var(--accent-lt); color: var(--accent); border-color: rgba(37,99,235,.2); }
    .badge.resolved    { background: var(--green-lt);  color: var(--green);  border-color: rgba(5,150,105,.2); }

    .empty-state { text-align: center; padding: 30px; color: var(--text-dim); font-size: 0.84rem; }
    .empty-state .ei { font-size: 2rem; margin-bottom: 8px; }

    .section-lbl {
      font-size: 0.69rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--text-dim); margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-lbl::after { content:''; flex:1; height:1px; background:var(--border); }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand"><span>🏙️</span> SmartCity</div>
  <div class="nav-right">
    <div class="nav-user">Citizen · <strong id="navName">—</strong></div>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="layout">

  <!-- LEFT: Submit form -->
  <div>
    <div class="section-lbl">New Report</div>
    <div class="card">
      <div class="card-head">
        <div class="card-head-icon">📋</div>
        <div>
          <h2>Report an Issue</h2>
          <p>Submit a city service request</p>
        </div>
      </div>
      <div class="card-body">
        <div class="field">
          <label>Category *</label>
          <div class="cat-grid">
            <div class="cat-btn" onclick="selCat('waste',this)"><div class="ci">🗑️</div><div class="cl">Waste</div></div>
            <div class="cat-btn" onclick="selCat('lighting',this)"><div class="ci">💡</div><div class="cl">Lighting</div></div>
            <div class="cat-btn" onclick="selCat('traffic',this)"><div class="ci">🚦</div><div class="cl">Traffic</div></div>
            <div class="cat-btn" onclick="selCat('infrastructure',this)"><div class="ci">🏗️</div><div class="cl">Infrastructure</div></div>
            <div class="cat-btn" onclick="selCat('water',this)"><div class="ci">🚰</div><div class="cl">Water</div></div>
            <div class="cat-btn" onclick="selCat('emergency',this)"><div class="ci">🚨</div><div class="cl">Emergency</div></div>
          </div>
          <input type="hidden" id="category"/>
        </div>

        <div class="field">
          <label>Subcategory *</label>
          <select id="subcategory"><option value="">— Pick a category first —</option></select>
        </div>

        <div class="field">
          <label>Description *</label>
          <textarea id="description" placeholder="Describe the issue — location, severity, context…"></textarea>
        </div>

        <div class="row">
          <div class="field">
            <label>Area *</label>
            <select id="area">
              <option value="dist_1">Old City</option>
              <option value="dist_2">Commercial Center</option>
              <option value="dist_3">University Zone</option>
              <option value="dist_4">Northern Suburbs</option>
              <option value="dist_5">Industrial Area</option>
              <option value="dist_6">Residential East</option>
              <option value="dist_7">Residential West</option>
              <option value="dist_8">Southern Zone</option>
            </select>
          </div>
          <div class="field">
            <label>Priority</label>
            <select id="priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Latitude</label>
            <input type="number" id="lat" value="31.902" step="0.001"/>
          </div>
          <div class="field">
            <label>Longitude</label>
            <input type="number" id="lng" value="35.203" step="0.001"/>
          </div>
        </div>

        <button class="btn-submit" id="submitBtn" onclick="submitRequest()">🚀 Submit Request</button>
        <div class="msg" id="submitMsg"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT: My requests -->
  <div>
    <div class="section-lbl">My Requests</div>
    <div class="card">
      <div class="card-head">
        <div class="card-head-icon">📂</div>
        <div>
          <h2>My History</h2>
          <p>Your submitted service requests</p>
        </div>
      </div>
      <div class="card-body" id="myRequests">
        <div class="empty-state"><div class="ei">📭</div><div>No requests yet.</div></div>
      </div>
    </div>
  </div>

</div>

<script>
  const SUBS = {
    waste: ['Overflowing Bin','Illegal Dumping','Blocked Drainage'],
    lighting: ['Broken Lamp Post','Unlit Zone','Flickering Light'],
    traffic: ['Pothole','Road Closure','Signal Failure','Congestion'],
    infrastructure: ['Broken Bench','Damaged Sidewalk','Graffiti'],
    water: ['Water Leak','Sewage Issue'],
    emergency: ['Flooding','Fire','Public Hazard'],
  };

  // Auth guard
  const name = localStorage.getItem('name') || '—';
  document.getElementById('navName').textContent = name;
  if (!localStorage.getItem('token')) window.location.href = 'login.html';

  function logout() { localStorage.clear(); window.location.href = 'login.html'; }

  function selCat(cat, el) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('sel'));
    el.classList.add('sel');
    document.getElementById('category').value = cat;
    const sel = document.getElementById('subcategory');
    sel.innerHTML = (SUBS[cat]||[]).map(s => `<option value="${s}">${s}</option>`).join('');
  }

  function showMsg(text, type) {
    const el = document.getElementById('submitMsg');
    el.textContent = text; el.className = 'msg ' + type;
  }

  async function submitRequest() {
    const token = localStorage.getItem('token');
    const areaEl = document.getElementById('area');
    const body = {
      category:    document.getElementById('category').value,
      subCategory: document.getElementById('subcategory').value,
      description: document.getElementById('description').value.trim(),
      areaId:      areaEl.value,
      areaName:    areaEl.options[areaEl.selectedIndex]?.text || '',
      priority:    document.getElementById('priority').value,
      lat:         parseFloat(document.getElementById('lat').value),
      lng:         parseFloat(document.getElementById('lng').value),
    };
    if (!body.category) return showMsg('Please select a category.', 'err');
    if (!body.description) return showMsg('Please add a description.', 'err');

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Submitting…';

    try {
      const res  = await fetch('/api/requests', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Session-Token': token },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (res.ok) {
        showMsg(`✓ Request submitted! ID: ${data.request_id} · Priority: ${data.priority}`, 'ok');
        document.getElementById('description').value = '';
        document.getElementById('category').value = '';
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('sel'));
        document.getElementById('subcategory').innerHTML = '<option>— Pick a category first —</option>';
        loadRequests();
      } else { showMsg(data.error || 'Submission failed.', 'err'); }
    } catch {
      // Demo mode: just show success
      showMsg(`✓ Demo: Request recorded locally.`, 'ok');
      addDemoRequest(body);
    }
    btn.disabled = false; btn.textContent = '🚀 Submit Request';
  }

  const demoRequests = [];
  function addDemoRequest(body) {
    demoRequests.unshift({ ...body, status: 'pending', _id: 'demo-' + Date.now() });
    renderRequests(demoRequests);
  }

  async function loadRequests() {
    const token = localStorage.getItem('token');
    try {
      const res  = await fetch('/api/my-requests', { headers: { 'X-Session-Token': token } });
      const data = await res.json();
      if (res.ok && data.requests?.length) { renderRequests(data.requests); return; }
    } catch {}
    renderRequests(demoRequests);
  }

  function renderRequests(list) {
    const el = document.getElementById('myRequests');
    if (!list.length) {
      el.innerHTML = '<div class="empty-state"><div class="ei">📭</div><div>No requests yet.</div></div>';
      return;
    }
    el.innerHTML = list.slice(0, 10).map(r => `
      <div class="req-item">
        <div>
          <div class="req-cat">${r.category}${r.subCategory ? ' · ' + r.subCategory : ''}</div>
          <div class="req-desc">${(r.description||'').slice(0,90)}${(r.description||'').length > 90 ? '…' : ''}</div>
          <div class="req-meta">${r.areaName || r.areaId || ''}</div>
        </div>
        <span class="badge ${r.status || 'pending'}">${r.status || 'pending'}</span>
      </div>
    `).join('');
  }

  loadRequests();
</script>
</body>
</html>
