<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue - SmartCity</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="nav">
        <a href="/submit" class="nav-brand">SmartCity Platform</a>
        <div class="nav-actions">
            <span class="user-info">Citizen</span>
            <button onclick="logout()" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="card-grid">
            <div class="card">
                <div class="card-header">Report City Issue</div>
                
                <div id="submit-error" class="error-message" style="display: none;"></div>
                <div id="submit-success" class="success-message" style="display: none;"></div>
                
                <form id="report-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="category">Category</label>
                            <select id="category" class="form-select" required>
                                <option value="">Select category</option>
                                <option value="Roads">Roads</option>
                                <option value="Sanitation">Sanitation</option>
                                <option value="Parks">Parks</option>
                                <option value="Public Safety">Public Safety</option>
                                <option value="Water">Water</option>
                                <option value="Electricity">Electricity</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="sub_category">Sub Category</label>
                            <input type="text" id="sub_category" class="form-input" placeholder="e.g., Pothole, Broken light">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="description">Description</label>
                        <textarea id="description" class="form-textarea" placeholder="Describe the issue in detail..." required></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="area_id">Area ID</label>
                            <input type="text" id="area_id" class="form-input" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="area_name">Area Name</label>
                            <input type="text" id="area_name" class="form-input" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="lat">Latitude</label>
                            <input type="number" id="lat" class="form-input" step="any">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="lng">Longitude</label>
                            <input type="number" id="lng" class="form-input" step="any">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block">Submit Report</button>
                </form>
            </div>
            
            <div>
                <div class="card">
                    <div class="card-header">Recent Reports</div>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Category</th>
                                <th>Priority</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="recent-requests">
                            <tr><td colspan="4">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
