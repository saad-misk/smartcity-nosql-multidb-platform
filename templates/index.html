<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCity Platform - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">SmartCity Platform</a>
    </nav>

    <div class="container">
        <div class="login-container">
            <div class="card">
                <div class="card-header">Login</div>
                
                <div id="login-error" class="error-message" style="display: none;"></div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label" for="role">Role</label>
                        <select id="role" class="form-select" required>
                            <option value="citizen">Citizen</option>
                            <option value="technician">Technician</option>
                            <option value="manager">City Manager</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" id="email" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" class="form-input" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                </form>
            </div>

            <div class="card" style="margin-top: 1rem;">
                <div class="card-header">Register (Citizens Only)</div>
                
                <div id="register-error" class="error-message" style="display: none;"></div>
                
                <form id="register-form">
                    <div class="form-group">
                        <label class="form-label" for="name">Full Name</label>
                        <input type="text" id="name" class="form-input" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="reg-email">Email</label>
                            <input type="email" id="reg-email" class="form-input" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="phone">Phone</label>
                            <input type="tel" id="phone" class="form-input" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="national_id">National ID</label>
                        <input type="text" id="national_id" class="form-input" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="area_id">Area ID</label>
                            <input type="text" id="area_id" class="form-input" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="area_name">Area Name</label>
                            <input type="text" id="area_name" class="form-input" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="reg-password">Password</label>
                        <input type="password" id="reg-password" class="form-input" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block">Register</button>
                </form>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
